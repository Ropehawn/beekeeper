# systemd-logind drop-in: stop the OS from interpreting M1 button presses
# as power-off / suspend requests.
#
# The M1 enclosure's user button is wired in parallel with the Tachyon's
# power button input. Without this drop-in, every press fires KEY_POWER,
# logind catches it, and the hub gracefully shuts itself down — exactly
# what we don't want.
#
# We also disable lid-switch and idle handling for completeness, since this
# is a headless deployment with no notion of "session".
#
# Install:
#   sudo cp hardware/tachyon-hub-py/logind.conf.d/50-beekeeper-panel.conf \
#           /etc/systemd/logind.conf.d/
#   sudo systemctl restart systemd-logind
#
# Verify with: loginctl show-session $(loginctl | awk 'NR==2{print $1}') | grep -i power

[Login]
HandlePowerKey=ignore
HandlePowerKeyLongPress=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
IdleAction=ignore
