<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus system policy: grants the `particle` user access to the org.bluez
  service. Required because the BeeKeeper hub daemon runs as `particle` (not
  root) under systemd, and Ubuntu 24.04's default BlueZ D-Bus policy rejects
  non-session-linked system services with:

    [org.freedesktop.DBus.Error.AccessDenied] Client tried to send a message
    other than Hello without being registered

  Install on each hub:
    sudo cp hardware/tachyon-hub-py/dbus/beekeeper-hub-bluetooth.conf \
            /etc/dbus-1/system.d/
    sudo systemctl restart bluetooth
    sudo systemctl restart beekeeper-hub-py

  D-Bus picks up new policies automatically for future connections, but
  restarting bluetooth forces existing connections to renegotiate.
-->
<busconfig>
  <policy user="particle">
    <allow send_destination="org.bluez"/>
    <allow send_interface="org.bluez.Adapter1"/>
    <allow send_interface="org.bluez.Device1"/>
    <allow send_interface="org.bluez.GattService1"/>
    <allow send_interface="org.bluez.GattCharacteristic1"/>
    <allow send_interface="org.bluez.GattDescriptor1"/>
    <allow send_interface="org.bluez.AgentManager1"/>
    <allow send_interface="org.bluez.LEAdvertisingManager1"/>
    <allow send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
